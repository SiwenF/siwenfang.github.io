<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200" role="img" aria-label="Abstract preview: event market betting (binary outcomes)">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0208"/>
      <stop offset="55%" style="stop-color:#16020a"/>
      <stop offset="100%" style="stop-color:#120208"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#e6007a;stop-opacity:0"/>
      <stop offset="45%" style="stop-color:#e6007a;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#e6007a;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="yesSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#19ff85;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#19ff85;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="noSide" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#e6007a;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#e6007a;stop-opacity:0.08"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8"/>
    </filter>
  </defs>
  <rect width="320" height="200" fill="url(#bg)"/>
  <g opacity="0.1" stroke="#e6007a" stroke-width="0.35" fill="none">
    <path d="M0 40h320M0 80h320M0 120h320M0 160h320"/>
    <path d="M40 0v200M80 0v200M120 0v200M160 0v200M200 0v200M240 0v200M280 0v200"/>
  </g>
  <rect x="0" y="76" width="320" height="48" fill="url(#glow)" opacity="0.85"/>
  <!-- bet slip perforation hint -->
  <g fill="#e6007a" fill-opacity="0.15">
    <circle cx="8" cy="100" r="2"/><circle cx="8" cy="112" r="2"/><circle cx="8" cy="124" r="2"/>
    <circle cx="312" cy="100" r="2"/><circle cx="312" cy="112" r="2"/><circle cx="312" cy="124" r="2"/>
  </g>
  <!-- event market card (Polymarket-style: one question, two outcomes) -->
  <rect x="44" y="36" width="232" height="96" rx="14" fill="#141018" stroke="#43162a" stroke-width="1"/>
  <path d="M60 56h200" stroke="#e6007a" stroke-opacity="0.15" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="3 5"/>
  <path d="M60 68h140" stroke="#fff" stroke-opacity="0.06" stroke-width="1" stroke-linecap="round"/>
  <path d="M60 76h110" stroke="#fff" stroke-opacity="0.05" stroke-width="1" stroke-linecap="round"/>
  <!-- binary outcome row: implied Yes / No stakes -->
  <rect x="56" y="92" width="100" height="28" rx="8" fill="url(#yesSide)" stroke="#19ff85" stroke-opacity="0.45" stroke-width="1"/>
  <rect x="164" y="92" width="100" height="28" rx="8" fill="url(#noSide)" stroke="#e6007a" stroke-opacity="0.45" stroke-width="1"/>
  <line x1="160" y1="92" x2="160" y2="120" stroke="#fff" stroke-opacity="0.08" stroke-width="1"/>
  <!-- small “odds” ticks inside each side -->
  <circle cx="78" cy="106" r="3" fill="#19ff85" opacity="0.5"/>
  <circle cx="92" cy="106" r="2" fill="#19ff85" opacity="0.35"/>
  <circle cx="228" cy="106" r="3" fill="#e6007a" opacity="0.55"/>
  <circle cx="242" cy="106" r="2" fill="#e6007a" opacity="0.35"/>
  <!-- liquidity depth (matched sides / pool — not price) -->
  <rect x="56" y="150" width="208" height="8" rx="4" fill="#1a1216" stroke="#43162a" stroke-width="0.8"/>
  <rect x="58" y="152" width="118" height="4" rx="2" fill="#19ff85" fill-opacity="0.35"/>
  <rect x="178" y="152" width="84" height="4" rx="2" fill="#e6007a" fill-opacity="0.3"/>
  <!-- participants / matched bets -->
  <g opacity="0.85">
    <circle cx="52" cy="178" r="4" fill="#19ff85" fill-opacity="0.25" stroke="#19ff85" stroke-opacity="0.4" stroke-width="1"/>
    <circle cx="72" cy="178" r="4" fill="#19ff85" fill-opacity="0.15" stroke="#19ff85" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="248" cy="178" r="4" fill="#e6007a" fill-opacity="0.2" stroke="#e6007a" stroke-opacity="0.45" stroke-width="1"/>
    <circle cx="268" cy="178" r="4" fill="#e6007a" fill-opacity="0.12" stroke="#e6007a" stroke-opacity="0.35" stroke-width="1"/>
  </g>
  <path d="M88 178h144" stroke="#fff" stroke-opacity="0.06" stroke-width="1" stroke-dasharray="2 6"/>
  <!-- resolution clock hint (event resolves) -->
  <circle cx="160" cy="26" r="10" fill="none" stroke="#e6007a" stroke-opacity="0.25" stroke-width="1"/>
  <path d="M160 26V20M160 26l4 2" stroke="#e6007a" stroke-opacity="0.35" stroke-width="1" stroke-linecap="round"/>
</svg>

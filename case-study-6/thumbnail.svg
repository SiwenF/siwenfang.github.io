<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200" role="img" aria-label="Abstract preview: Dynamic Island live status">
  <defs>
    <linearGradient id="cs6bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000"/>
      <stop offset="50%" style="stop-color:#0a0508"/>
      <stop offset="100%" style="stop-color:#120810"/>
    </linearGradient>
    <linearGradient id="cs6lime" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#BCFF2F;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#BCFF2F;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#BCFF2F;stop-opacity:0"/>
    </linearGradient>
    <filter id="cs6blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.4"/>
    </filter>
  </defs>
  <rect width="320" height="200" fill="url(#cs6bg)"/>
  <g opacity="0.1" stroke="#BCFF2F" stroke-width="0.35" fill="none">
    <path d="M0 50h320M0 100h320M0 150h320"/>
    <path d="M53 0v200M107 0v200M160 0v200M213 0v200M267 0v200"/>
  </g>
  <rect x="0" y="88" width="320" height="36" fill="url(#cs6lime)" opacity="0.85"/>
  <!-- island capsule -->
  <rect x="96" y="84" width="128" height="36" rx="18" fill="#0a0a0a" stroke="#BCFF2F" stroke-opacity="0.35" stroke-width="1.2"/>
  <ellipse cx="160" cy="102" rx="38" ry="10" fill="none" stroke="#BCFF2F" stroke-opacity="0.5" stroke-width="1.2" filter="url(#cs6blur)"/>
  <!-- activity ring -->
  <circle cx="128" cy="102" r="9" fill="none" stroke="#BCFF2F" stroke-width="2" stroke-dasharray="14 32" stroke-linecap="round" opacity="0.9"/>
  <path d="M128 96v6l3 3" stroke="#BCFF2F" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.85"/>
  <!-- status ticks -->
  <circle cx="188" cy="102" r="3" fill="#BCFF2F" opacity="0.9"/>
  <circle cx="200" cy="102" r="3" fill="#BCFF2F" opacity="0.55"/>
  <circle cx="212" cy="102" r="3" fill="#BCFF2F" opacity="0.3"/>
  <!-- pink accent arcs (portfolio) -->
  <path d="M24 36 C 100 12 200 48 296 28" fill="none" stroke="#e6007a" stroke-width="1.2" opacity="0.28" stroke-linecap="round"/>
  <circle cx="160" cy="156" r="5" fill="none" stroke="#e6007a" stroke-opacity="0.35" stroke-width="1"/>
  <path d="M140 168h40" stroke="#e6007a" stroke-opacity="0.25" stroke-width="1" stroke-linecap="round"/>
</svg>
